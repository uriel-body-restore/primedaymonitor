<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Day Deal Monitor — Body Restore</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1a2e; }
  header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
  header .badge { background: #f0b429; color: #1a1a2e; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
  .toolbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0.75rem 2rem; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .toolbar label { font-size: 13px; color: #6b7280; margin-right: 4px; }
  select, input[type="text"] { font-size: 13px; border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 10px; background: #fff; color: #1a1a2e; outline: none; }
  select:focus, input:focus { border-color: #4f46e5; }
  .btn { font-size: 13px; padding: 5px 14px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; color: #374151; transition: all 0.15s; }
  .btn:hover { background: #f3f4f6; }
  .btn.primary { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .btn.primary:hover { background: #4338ca; }
  .summary-bar { display: flex; gap: 12px; padding: 1rem 2rem; flex-wrap: wrap; }
  .stat { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 0.75rem 1.25rem; min-width: 130px; }
  .stat .num { font-size: 1.6rem; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .stat.ok .num { color: #10b981; }
  .stat.warn .num { color: #f59e0b; }
  .stat.pending .num { color: #6b7280; }
  .main { padding: 0 2rem 2rem; }
  .marketplace-section { margin-bottom: 2rem; }
  .mp-header { display: flex; align-items: center; gap: 10px; padding: 0.6rem 0 0.4rem; border-bottom: 2px solid #e5e7eb; margin-bottom: 0.5rem; }
  .mp-header h2 { font-size: 1rem; font-weight: 700; }
  .mp-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #e0e7ff; color: #4338ca; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; font-size: 13px; }
  thead tr { background: #f9fafb; }
  th { text-align: left; padding: 9px 12px; font-weight: 600; color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.highlighted { background: #fffbeb; }
  tr:hover td { background: #f9fafb; }
  .product-name { font-weight: 500; max-width: 260px; }
  .asin { font-family: 'Courier New', monospace; font-size: 12px; color: #4f46e5; }
  .price { font-weight: 600; }
  .deal-price { color: #10b981; }
  .max-price { color: #6b7280; }
  .status-cell { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.ok { background: #10b981; }
  .dot.warn { background: #f59e0b; }
  .dot.pending { background: #d1d5db; }
  .status-text.ok { color: #10b981; font-size: 12px; }
  .status-text.warn { color: #f59e0b; font-size: 12px; }
  .status-text.pending { color: #9ca3af; font-size: 12px; }
  .note-tag { font-size: 11px; background: #fef3c7; color: #92400e; border-radius: 4px; padding: 2px 6px; border: 1px solid #fde68a; }
  .price-input { width: 80px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 5px; padding: 3px 6px; text-align: center; }
  .price-input.match { border-color: #10b981; background: #f0fdf4; }
  .price-input.mismatch { border-color: #ef4444; background: #fef2f2; }
  .action-btns { display: flex; gap: 6px; }
  .open-link { font-size: 11px; padding: 4px 8px; border-radius: 5px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; color: #374151; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; }
  .open-link:hover { background: #f3f4f6; }
  .open-link svg { width: 10px; height: 10px; }
  .check-btn { font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; color: #4f46e5; font-weight: 600; white-space: nowrap; transition: all 0.15s; }
  .check-btn:hover { background: #eef2ff; }
  .timestamp { font-size: 11px; color: #9ca3af; }
  .last-updated { font-size: 12px; color: #9ca3af; padding: 0 2rem 1rem; }
  .updated-badge { font-size: 11px; background: #dcfce7; color: #166534; border-radius: 4px; padding: 2px 8px; border: 1px solid #bbf7d0; margin-left: 8px; }
</style>
</head>
<body>

<header>
  <h1>Body Restore — Prime Day Deal Monitor <span class="updated-badge">Updated Jun 23, 2026</span></h1>
  <span class="badge">Jun 23–26, 2026</span>
</header>

<div class="toolbar">
  <label>Marketplace:</label>
  <select id="mp-filter" onchange="render()">
    <option value="all">All marketplaces</option>
    <option value="US">🇺🇸 US</option>
    <option value="CA">🇨🇦 CA</option>
    <option value="UK">🇬🇧 UK</option>
    <option value="DE">🇩🇪 DE</option>
  </select>
  <label>Status:</label>
  <select id="status-filter" onchange="render()">
    <option value="all">All</option>
    <option value="ok">Live & matching</option>
    <option value="warn">Needs attention</option>
    <option value="pending">Not checked</option>
  </select>
  <label>Search:</label>
  <input type="text" id="search" placeholder="Product or ASIN..." oninput="render()" style="width:200px">
  <button class="btn" onclick="resetAll()">Reset all checks</button>
  <button class="btn primary" onclick="exportCSV()">Export log</button>
</div>

<div class="summary-bar" id="summary-bar"></div>
<div class="last-updated" id="last-updated"></div>
<div class="main" id="main"></div>

<script>
const MARKETPLACES = {
  US: { flag: '🇺🇸', domain: 'amazon.com' },
  CA: { flag: '🇨🇦', domain: 'amazon.ca' },
  UK: { flag: '🇬🇧', domain: 'amazon.co.uk' },
  DE: { flag: '🇩🇪', domain: 'amazon.de' },
};

const PRODUCTS = [
  // US - Korean Face Masks
  { mp:'US', cat:'Korean Face Masks',        name:'Collagen Face Mask - Anti-Aging 5 Pack',          asin:'B0F2D2XSH6', deal:'$8.49',  max:'$8.49',    note:'' },
  { mp:'US', cat:'Korean Face Masks',        name:'Collagen Face Mask - Glow 5 Pack',                asin:'B0F2CWDCHZ', deal:'$8.49',  max:'$8.49',    note:'' },
  { mp:'US', cat:'Korean Face Masks',        name:'Bakuchiol Toner Pads (Featured)',                 asin:'B0F2CWRGXF', deal:'$13.59', max:'$13.59',   note:'' },
  { mp:'US', cat:'Korean Face Masks',        name:'Niacinamide Cooling Jelly Toner Pads',            asin:'B0F2CWSFKP', deal:'$13.59', max:'$13.59',   note:'' },
  // US - Face Masks & Toner Pads
  { mp:'US', cat:'Face Masks & Toner Pads',  name:'Whipped Beef Tallow Balm - Lavender',             asin:'B0F3DJLKRC', deal:'$13.59', max:'$19.99',   note:'' },
  { mp:'US', cat:'Face Masks & Toner Pads',  name:'Beef Tallow Lip Mask - Peppermint',               asin:'B0F6MC1DS7', deal:'$11.89', max:'$13.99',   note:'' },
  { mp:'US', cat:'Face Masks & Toner Pads',  name:'Beef Tallow Lip Mask - Manuka Honey',             asin:'B0F6MCF63Y', deal:'$11.89', max:'$13.99',   note:'' },
  { mp:'US', cat:'Face Masks & Toner Pads',  name:'Beef Tallow Lip Mask - Unscented',                asin:'B0F6MSP8L8', deal:'$11.30', max:'$13.99',   note:'' },
  { mp:'US', cat:'Face Masks & Toner Pads',  name:'Whipped Beef Tallow Balm - Eucalyptus (Featured)',asin:'B0F2CWB595', deal:'$8.07',  max:'$19.99',    note:'' },
  { mp:'US', cat:'Face Masks & Toner Pads',  name:'Whipped Beef Tallow Balm - Unscented',            asin:'B0F2CSC7LG', deal:'$8.07',  max:'$19.99',    note:'' },
  { mp:'US', cat:'Face Masks & Toner Pads',  name:'Beef Tallow Lip Mask - Bergamot',                 asin:'B0F6MB9MTN', deal:'$11.89', max:'$13.99',   note:'' },
  // US - Eye Masks
  { mp:'US', cat:'Eye Masks',                name:'Eye Mask 5 Pack - Green Tea',                     asin:'B0DM3MM57G', deal:'$8.47',  max:'$9.97',    note:'' },
  { mp:'US', cat:'Eye Masks',                name:'Eye Mask 5 Pack - Lavender',                      asin:'B0DM3B9F16', deal:'$8.47',  max:'$9.97',    note:'' },
  { mp:'US', cat:'Eye Masks',                name:'Eye Mask 5 Pack - Unscented',                     asin:'B0DM3GPV9P', deal:'$8.47',  max:'$9.97',    note:'' },
  { mp:'US', cat:'Eye Masks',                name:'Eye Mask 30 Pack - Variety (Featured)',            asin:'B0DM4222MV', deal:'$25.49', max:'$29.99',   note:'' },
  { mp:'US', cat:'Eye Masks',                name:'Eye Mask 5 Pack - Variety',                       asin:'B0DM2PZT88', deal:'$8.49',  max:'$9.99',    note:'' },
  // US - Shower Steamers
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Citrus',                asin:'B689VN6FMS', deal:'$20.17', max:'$23.74',   note:'' },
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 6 Pack - Bloom',                  asin:'B0BJYCRSS1', deal:'$13.71', max:'$16.99',   note:'' },
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Tea Tree',              asin:'B68S6WZGCW', deal:'$21.24', max:'$21.24',   note:'' },
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Lavender',              asin:'B68FDCLXNP', deal:'$19.93', max:'$20.99',   note:'' },
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Eucalyptus (Featured)', asin:'B68BC88KG1', deal:'$22.55', max:'$23.74',   note:'' },
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 6 Pack - Citrus (Men)',           asin:'B68XBEN8DL', deal:'$13.71', max:'$14.44',   note:'' },
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 30 Pack - Collectors Box',        asin:'B68S6XG2GB', deal:'$47.63', max:'$50.14',   note:'' },
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Rose',                  asin:'B68S79VN13', deal:'$21.24', max:'$21.24',   note:'' },
  { mp:'US', cat:'Shower Steamers',          name:'Shower Steamers 6 Pack - Clarity',                asin:'B68JXRWWHX', deal:'$11.88', max:'$11.88',   note:'' },
  // CA - Shower Steamers
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Citrus',                asin:'B089VN6FMS', deal:'CA$26.02', max:'CA$27.39', note:'' },
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Eucalyptus (Featured)', asin:'B08BC88KG1', deal:'CA$26.02', max:'CA$27.39', note:'' },
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Lavender',              asin:'B08FDCLXNP', deal:'CA$27.39', max:'CA$30.82', note:'' },
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Tea Tree',              asin:'B08S6WZGCW', deal:'CA$26.02', max:'CA$27.39', note:'' },
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 30 Pack - Collectors Box',        asin:'B08S6XG2GB', deal:'CA$59.84', max:'CA$62.99', note:'' },
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Rose',                  asin:'B08S79VN13', deal:'CA$27.39', max:'CA$29.69', note:'' },
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 6 Pack - Clarity',                asin:'B0BJXRWWHX', deal:'CA$17.09', max:'CA$17.99', note:'' },
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 6 Pack - Bloom',                  asin:'B0BJYCRS51', deal:'CA$17.09', max:'CA$17.99', note:'' },
  { mp:'CA', cat:'Shower Steamers',          name:'Shower Steamers 6 Pack - Citrus (Men)',           asin:'B0BXBBN8DL', deal:'CA$15.38', max:'CA$16.19', note:'' },
  // UK - Shower Steamers
  { mp:'UK', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Lavender',              asin:'B68FDCLX9P', deal:'£16.99', max:'£19.99',   note:'' },
  { mp:'UK', cat:'Shower Steamers',          name:'Shower Steamers 30 Pack - Collectors Box',        asin:'B68S6XG2GB', deal:'£42.49', max:'£49.99',   note:'' },
  { mp:'UK', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Eucalyptus (Featured)', asin:'B68BC88KG1', deal:'£13.96', max:'£16.38',   note:'' },
  // DE - Shower Steamers
  { mp:'DE', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Lavender',              asin:'B68FDCLXNP', deal:'€13.76', max:'€13.76',   note:'' },
  { mp:'DE', cat:'Shower Steamers',          name:'Shower Steamers 6 Pack - Citrus',                 asin:'B68XBEN8DL', deal:'€8.49',  max:'€9.99',    note:'⚠️ Inactive SKU' },
  { mp:'DE', cat:'Shower Steamers',          name:'Shower Steamers 15 Pack - Eucalyptus (Featured)', asin:'B68BC88KG1', deal:'€13.76', max:'€13.76',   note:'' },
];

let checks = {};
try { checks = JSON.parse(localStorage.getItem('pd_checks_v2') || '{}'); } catch(e) {}
function saveChecks() { try { localStorage.setItem('pd_checks_v2', JSON.stringify(checks)); } catch(e) {} }
function getKey(p) { return p.mp + '_' + p.asin; }
function getStatus(p) { const k = getKey(p); return checks[k] ? checks[k].status : 'pending'; }
function amazonUrl(asin, mp) { return `https://www.${MARKETPLACES[mp].domain}/dp/${asin}`; }

function markStatus(key, status, livePrice) {
  checks[key] = { status, livePrice: livePrice || '', ts: new Date().toLocaleTimeString() };
  saveChecks(); render(); updateLastUpdated();
}

function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  const any = Object.values(checks).filter(c => c.ts);
  if (any.length) el.textContent = 'Last check logged at ' + any[any.length-1].ts;
}

function resetAll() {
  if (confirm('Reset all check statuses?')) { checks = {}; saveChecks(); render(); }
}

function filtered() {
  const mp = document.getElementById('mp-filter').value;
  const st = document.getElementById('status-filter').value;
  const q = document.getElementById('search').value.toLowerCase();
  return PRODUCTS.filter(p => {
    if (mp !== 'all' && p.mp !== mp) return false;
    if (st !== 'all' && getStatus(p) !== st) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.asin.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderSummary() {
  const total = PRODUCTS.length;
  const ok = PRODUCTS.filter(p => getStatus(p) === 'ok').length;
  const warn = PRODUCTS.filter(p => getStatus(p) === 'warn').length;
  const pending = PRODUCTS.filter(p => getStatus(p) === 'pending').length;
  document.getElementById('summary-bar').innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lbl">Total deals</div></div>
    <div class="stat ok"><div class="num">${ok}</div><div class="lbl">Live & OK</div></div>
    <div class="stat warn"><div class="num">${warn}</div><div class="lbl">Needs attention</div></div>
    <div class="stat pending"><div class="num">${pending}</div><div class="lbl">Not checked</div></div>`;
}

function render() {
  renderSummary();
  const items = filtered();
  const grouped = {};
  items.forEach(p => {
    const key = p.mp + '||' + p.cat;
    if (!grouped[key]) grouped[key] = { mp: p.mp, cat: p.cat, items: [] };
    grouped[key].items.push(p);
  });

  const main = document.getElementById('main');
  if (!Object.keys(grouped).length) { main.innerHTML = '<p style="color:#9ca3af;padding:2rem 0;">No products match your filters.</p>'; return; }

  main.innerHTML = Object.values(grouped).map(group => {
    const { flag } = MARKETPLACES[group.mp];
    const rows = group.items.map(p => {
      const k = getKey(p);
      const st = getStatus(p);
      const chk = checks[k] || {};
      const url = amazonUrl(p.asin, p.mp);
      const isWarn = p.note && p.note.includes('⚠️');
      const liveVal = chk.livePrice || '';
      const matchClass = liveVal ? (liveVal === p.deal ? 'match' : 'mismatch') : '';
      const statusLabel = { ok:'Live & matching', warn:'Needs attention', pending:'Not checked' }[st] || 'Not checked';
      return `<tr class="${isWarn ? 'highlighted' : ''}">
        <td><div class="product-name">${p.name}</div>${p.note ? `<div style="margin-top:3px"><span class="note-tag">${p.note}</span></div>` : ''}</td>
        <td><span class="asin">${p.asin}</span></td>
        <td><span class="price deal-price">${p.deal}</span></td>
        <td><span class="price max-price">${p.max}</span></td>
        <td><input class="price-input ${matchClass}" type="text" placeholder="Enter live price" value="${liveVal}" onchange="updateLive('${k}', this.value, '${p.deal}')" title="Enter the price shown on Amazon right now"></td>
        <td><div class="status-cell"><div class="dot ${st}"></div><span class="status-text ${st}">${statusLabel}</span>${chk.ts ? `<span class="timestamp"> ${chk.ts}</span>` : ''}</div></td>
        <td><div class="action-btns">
          <a class="open-link" href="${url}" target="_blank">Amazon <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1h4v4M11 1L5 7M2 3H1v8h8v-1"/></svg></a>
          <button class="check-btn" onclick="markStatus('${k}','ok','${p.deal}')">✓ OK</button>
          <button class="check-btn" style="color:#ef4444" onclick="markStatus('${k}','warn','')">⚠ Flag</button>
        </div></td>
      </tr>`;
    }).join('');
    return `<div class="marketplace-section">
      <div class="mp-header"><h2>${flag} ${group.mp} — ${group.cat}</h2><span class="mp-badge">${group.items.length} products</span></div>
      <table>
        <thead><tr><th>Product</th><th>ASIN</th><th>Deal price</th><th>Max deal price</th><th>Live price (enter manually)</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }).join('');
}

function updateLive(k, val, dealPrice) {
  const existing = checks[k] || {};
  const match = val.trim() === dealPrice.trim();
  checks[k] = { ...existing, livePrice: val.trim(), status: match ? 'ok' : (val ? 'warn' : existing.status || 'pending'), ts: new Date().toLocaleTimeString() };
  saveChecks(); render();
}

function exportCSV() {
  const rows = [['Marketplace','Category','Product','ASIN','Deal Price','Max Deal Price','Live Price Observed','Status','Checked At','Notes']];
  PRODUCTS.forEach(p => {
    const c = checks[getKey(p)] || {};
    rows.push([p.mp, p.cat, p.name, p.asin, p.deal, p.max, c.livePrice||'', c.status||'not checked', c.ts||'', p.note]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `PrimeDay_Monitor_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

render();
updateLastUpdated();
</script>
</body>
</html>
