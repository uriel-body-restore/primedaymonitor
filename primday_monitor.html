<!DOCTYPE html>
<html lang="en">
<head>

<title>Prime Day Deal Monitor — Body Restore</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1a2e; }
  header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
  header .badge { background: #f0b429; color: #1a1a2e; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
  .toolbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0.75rem 2rem; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .toolbar label { font-size: 13px; color: #6b7280; margin-right: 4px; }
  select, input[type="text"] { font-size: 13px; border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 10px; background: #fff; color: #1a1a2e; outline: none; }
  select:focus, input:focus { border-color: #4f46e5; }
  .btn { font-size: 13px; padding: 5px 14px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; color: #374151; transition: all 0.15s; }
  .btn:hover { background: #f3f4f6; }
  .btn.primary { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .btn.primary:hover { background: #4338ca; }
  .summary-bar { display: flex; gap: 12px; padding: 1rem 2rem; flex-wrap: wrap; }
  .stat { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 0.75rem 1.25rem; min-width: 130px; }
  .stat .num { font-size: 1.6rem; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .stat.ok .num { color: #10b981; }
  .stat.warn .num { color: #f59e0b; }
  .stat.pending .num { color: #6b7280; }
  .main { padding: 0 2rem 2rem; }
  .marketplace-section { margin-bottom: 2rem; }
  .mp-header { display: flex; align-items: center; gap: 10px; padding: 0.6rem 0 0.4rem; border-bottom: 2px solid #e5e7eb; margin-bottom: 0.5rem; }
  .mp-header h2 { font-size: 1rem; font-weight: 700; }
  .mp-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #e0e7ff; color: #4338ca; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; font-size: 13px; }
  thead tr { background: #f9fafb; }
  th { text-align: left; padding: 9px 12px; font-weight: 600; color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.highlighted { background: #fffbeb; }
  tr:hover td { background: #f9fafb; }
  .product-name { font-weight: 500; max-width: 260px; }
  .asin { font-family: 'Courier New', monospace; font-size: 12px; color: #4f46e5; }
  .price { font-weight: 600; }
  .deal-price { color: #10b981; }
  .max-price { color: #6b7280; }
  .status-cell { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.ok { background: #10b981; }
  .dot.warn { background: #f59e0b; }
  .dot.pending { background: #d1d5db; }
  .status-text.ok { color: #10b981; font-size: 12px; }
  .status-text.warn { color: #f59e0b; font-size: 12px; }
  .status-text.pending { color: #9ca3af; font-size: 12px; }
  .note-tag { font-size: 11px; background: #fef3c7; color: #92400e; border-radius: 4px; padding: 2px 6px; border: 1px solid #fde68a; }
  .price-input { width: 80px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 5px; padding: 3px 6px; text-align: center; }
  .price-input.match { border-color: #10b981; background: #f0fdf4; }
  .price-input.mismatch { border-color: #ef4444; background: #fef2f2; }
  .action-btns { display: flex; gap: 6px; }
  .open-link { font-size: 11px; padding: 4px 8px; border-radius: 5px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; color: #374151; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; }
  .open-link:hover { background: #f3f4f6; }
  .open-link svg { width: 10px; height: 10px; }
  .check-btn { font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; color: #4f46e5; font-weight: 600; white-space: nowrap; transition: all 0.15s; }
  .check-btn:hover { background: #eef2ff; }
  .timestamp { font-size: 11px; color: #9ca3af; }
  .last-updated { font-size: 12px; color: #9ca3af; padding: 0 2rem 1rem; }
  .updated-badge { font-size: 11px; background: #dcfce7; color: #166534; border-radius: 4px; padding: 2px 8px; border: 1px solid #bbf7d0; margin-left: 8px; }
</style>
</head>
